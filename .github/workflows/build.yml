name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build skill files
        run: make build

      - name: Upload skill files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-files
          path: dist/*.skill
          retention-days: 7
